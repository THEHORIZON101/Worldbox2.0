<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divine Terrain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game" aria-label="Divine Terrain game canvas"></canvas>

  <div id="ui">
    <section id="hud" class="hud"></section>

    <section id="leftControls" class="left-controls"></section>

    <section class="minimap-wrap">
      <canvas id="minimap" width="256" height="256"></canvas>
      <span>Minimap</span>
    </section>

    <section class="help-card">
      <b>Controls</b>
      <span>WASD move</span>
      <span>Left click use power</span>
      <span>Right drag pan</span>
      <span>Wheel zoom</span>
      <span>Space pause</span>
      <span>B/N brush</span>
    </section>

    <section id="toolbar" class="toolbar">
      <div id="tabs" class="tabs"></div>
      <div id="powers" class="powers"></div>
    </section>

    <aside id="inspectPanel" class="inspect-panel"></aside>

    <div id="tooltip" class="tooltip"></div>
    <div id="toast" class="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
